    RecurringPayment:
      required:
      - account
      - description
      - paymentSource
      - bankAccount
      type: object
      properties:
        guid:
          format: uuid
          type: string
          example: 00000000-0000-0000-0000-000000000000
        lawPayTokenId:
          type: string
        headNoteId:
          type: string
        accountId:
          format: int64
          type: integer
        account:
          $ref: '#/components/schemas/Account'
        projectId:
          format: int64
          type: integer
        project:
          $ref: '#/components/schemas/Project'
        notes:
          type: string
        description:
          description: Description for the recurring charge
          type: string
        currency:
          description: 3-letter ISO 4217 code representing the currency in which the
            amount is denominated (optional, defaults to USD)
          type: string
        status:
          description: Status of the recurring charge (read-only).
          enum:
          - Active
          - Completed
          - Deleted
          - Canceled
          - Pending
          type: string
        statusReason:
          description: "Reason code indicating why the recurring charge transitioned\
            \ to the current status (read-only). Enumeration of:\r\nschedule_complete\
            \ - Recurring charge completed normally, having attempted all scheduled\
            \ payments.\r\nuser_canceled - The Merchant canceled the recurring charge"
          enum:
          - schedule_complete
          - user_canceled
          - corrupt
          type: string
        reference:
          description: An optional reference to be set on each Charge created to collect
            a scheduled payment associated with this recurring charge (optional)
          type: string
        paymentSourceGuid:
          format: uuid
          description: 'Used to set the reference in POST and PUT '
          type: string
          example: 00000000-0000-0000-0000-000000000000
        paymentSource:
          $ref: '#/components/schemas/PaymentSource'
        bankAccountGuid:
          format: uuid
          description: 'Used to set the reference in POST and PUT '
          type: string
          example: 00000000-0000-0000-0000-000000000000
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        amount:
          format: double
          description: The amount to charge on each scheduled payment, in terms of
            the currency's smallest unit. For USD, this is the amount in cents. The
            maximum value is 10^14 - 1.
          type: number
        schedule:
          $ref: '#/components/schemas/RecurringPaymentSchedule'
        maxOccurrences:
          format: double
          description: " OPTIONAL\r\n The maximum number of scheduled payments that\
            \ will be attempted before the recurring charge is automatically marked\
            \ completed. Note that maximum occurrences tracks scheduled payments,\
            \ and not actual transactions created to collect on those scheduled payments.\r\
            \nFor example, a Charge associated with an occurrence may initially fail\
            \ if the credit card associated with the recurring charge is declined\
            \ or expired; however, after the payment details are updated, a subsequent\
            \ Charge associated with the same occurrence may succeed.In this scenario,\
            \ however, only a single occurrence is counted towards the max_occurrences\
            \ limit."
          type: number
        maxAmount:
          format: double
          description: "OPTIONAL\r\nThe maximum amount the recurring charge will attempt\
            \ to collect before the recurring charge is automatically marked completed.\
            \ This value must be greater than or equal to amount. The final occurrence\
            \ of a recurring charge will be the lesser of amount and the remainder\
            \ of max_amount less total_amount.\r\nFor example, a recurring charge\
            \ with a scheduled amount of $100 and a maximum amount of $150 will result\
            \ in an initial occurrence for $100 followed by a final occurrence of\
            \ $50. Note that max_amount, just like max_occurrences, tracks scheduled\
            \ payments, and not actual transactions created to collect on those scheduled\
            \ payments."
          type: number
        isCreateInvoiceWithPayment:
          description: If this is set to true, when we get a notification that the
            payment was charged, we will also add an invoice and apply the payment
            on the invoice.
          type: boolean
        itemId:
          format: int64
          type: integer
        item:
          $ref: '#/components/schemas/Product'
        tax1:
          $ref: '#/components/schemas/SalesTax'
        tax2:
          $ref: '#/components/schemas/SalesTax'
        isDeleted:
          type: boolean
        createdBy:
          $ref: '#/components/schemas/User'
        createdDate:
          format: date-time
          type: string
        billedBy:
          $ref: '#/components/schemas/User'
        lastModifiedBy:
          $ref: '#/components/schemas/User'
        lastModifiedDate:
          format: date-time
          type: string
        tenantId:
          format: int64
          type: integer
        tenant:
          $ref: '#/components/schemas/Tenant'
        occurrences:
          type: array
          items:
            $ref: '#/components/schemas/RecurringPaymentOccurrence'
        lastDateOfMigrationRequest:
          format: date-time
          type: string
        migrationRequestCount:
          format: int32
          type: integer
        installments:
          format: int32
          type: integer
        isCustomRecurringPayment:
          type: boolean
          readOnly: true
