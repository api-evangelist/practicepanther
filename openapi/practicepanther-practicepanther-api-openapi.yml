          format: int32
          description: " The frequency with which the schedule is executed, in terms\
            \ of the interval_unit.\r\nFor example, if the interval unit is DAY, an\
            \ interval delay of 1 means the schedule is executed every day; an interval\
            \ delay of 2 means execution every other day; and an interval delay of\
            \ 30 would mean the schedule is executed every 30 days."
          type: integer
