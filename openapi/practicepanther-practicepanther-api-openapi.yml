          description: "The interval unit of the schedule. Enumeration of:\r\nDAY\
            \ - Scheduled payments are performed every n days, based on the interval_delay.\r\
            \nWEEK - Scheduled payments are performed every n weeks, based on the\
            \ interval_delay.\r\nMONTH - Scheduled payments are performed every n\
            \ months, based on the interval_delay."
