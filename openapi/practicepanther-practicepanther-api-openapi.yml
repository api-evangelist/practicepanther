openapi: 3.0.0
info:
  version: v1
  title: Legacy API (v1)
  description: ''
paths:
  /api/account/{guid}:
    get:
      tags:
      - Account
      summary: Returns an account (contact)
      operationId: Account_GetAccount
      parameters:
      - name: guid
        in: path
        description: ''
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDTO_Detail'
            text/json:
              schema:
                $ref: '#/components/schemas/AccountDTO_Detail'
      security:
      - oauth2:
        - full
  /api/account:
