          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountDTO_Export'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountDTO_Export'
