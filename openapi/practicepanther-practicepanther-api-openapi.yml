        - full
    post:
      tags:
      - Account
      summary: Created a new account (contact)
      operationId: Account_PostAccount
      requestBody:
        $ref: '#/components/requestBodies/AccountDTO_Detail'
      responses:
        '200':
          description: OK
          content:
            application/json:
